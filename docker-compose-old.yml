version: '3.8'

services:

  # ─── Service Discovery ───────────────────────────────────
  eureka-server:
    build: ./services/eureka-server
    container_name: dating-eureka
    ports:
      - "8761:8761"
    networks:
      - dating-network
    restart: unless-stopped

  # ─── Microservices ───────────────────────────────────────
  api-gateway:
    build: ./services/api-gateway
    container_name: dating-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - dating-network
    restart: unless-stopped

  auth-service:
    build: ./services/auth-service
    container_name: dating-auth
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${AUTH_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      USER_SERVICE_URL: http://dating-user:8082
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - dating-network
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    container_name: dating-user
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${USER_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      PORT: 8082
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
    networks:
      - dating-network
    restart: unless-stopped

  swipe-service:
    build: ./services/swipe-service
    container_name: dating-swipe
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${SWIPE_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  match-service:
    build: ./services/match-service
    container_name: dating-match
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - user-service
      - chat-service
    environment:
      DATABASE_URL: ${MATCH_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      USER_SERVICE_URL: http://dating-user:8082
      CHAT_SERVICE_URL: http://dating-chat:8085
    networks:
      - dating-network
    restart: unless-stopped

  chat-service:
    build: ./services/chat-service
    container_name: dating-chat
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    environment:
      MONGODB_URL: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  event-service:
    build: ./services/event-service
    container_name: dating-event
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${EVENT_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  location-service:
    build: ./services/location-service
    container_name: dating-location
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${LOCATION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  mood-service:
    build: ./services/mood-service
    container_name: dating-mood
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${MOOD_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  radar-service:
    build: ./services/radar-service
    container_name: dating-radar
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${RADAR_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
    networks:
      - dating-network
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: dating-notification
    ports:
      - "8092:8092"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${NOTIFICATION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      SWIPE_SERVICE_URL: http://dating-swipe:8083
    networks:
      - dating-network
    restart: unless-stopped

  subscription-service:
    build: ./services/subscription-service
    container_name: dating-subscription
    ports:
      - "8091:8091"
    depends_on:
      - eureka-server
    environment:
      DATABASE_URL: ${SUBSCRIPTION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    networks:
      - dating-network
    restart: unless-stopped

networks:
  dating-network:
    driver: bridge

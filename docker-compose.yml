version: '3.8'

services:

  # ─── Service Discovery ───────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    container_name: dating-eureka
    ports:
      - "8761:8761"
    env_file:
      - .env
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  # ─── Microservices ───────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: dating-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
      AUTH_SERVICE_URL: http://dating-auth:8081
      USER_SERVICE_URL: http://dating-user:8082
      SWIPE_SERVICE_URL: http://dating-swipe:8083
      MATCH_SERVICE_URL: http://dating-match:8084
      CHAT_SERVICE_URL: http://dating-chat:8085
      EVENT_SERVICE_URL: http://dating-event:8086
      LOCATION_SERVICE_URL: http://dating-location:8087
      MOOD_SERVICE_URL: http://dating-mood:8088
      RADAR_SERVICE_URL: http://dating-radar:8089
      SUBSCRIPTION_SERVICE_URL: http://dating-subscription:8091
      NOTIFICATION_SERVICE_URL: http://dating-notification:8092
      ADMIN_SERVICE_URL: http://dating-admin:8095
    networks:
      - dating-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: dating-auth
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${AUTH_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      USER_SERVICE_URL: http://dating-user:8082
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: dating-user
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${USER_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      PORT: 8082
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  swipe-service:
    build:
      context: .
      dockerfile: services/swipe-service/Dockerfile
    container_name: dating-swipe
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${SWIPE_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  match-service:
    build:
      context: .
      dockerfile: services/match-service/Dockerfile
    container_name: dating-match
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - user-service
      - chat-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ${MATCH_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      USER_SERVICE_URL: http://dating-user:8082
      CHAT_SERVICE_URL: http://dating-chat:8085
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: dating-chat
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      MONGODB_URL: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: services/event-service/Dockerfile
    container_name: dating-event
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${EVENT_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  location-service:
    build:
      context: .
      dockerfile: services/location-service/Dockerfile
    container_name: dating-location
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${LOCATION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  mood-service:
    build:
      context: .
      dockerfile: services/mood-service/Dockerfile
    container_name: dating-mood
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${MOOD_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  radar-service:
    build:
      context: .
      dockerfile: services/radar-service/Dockerfile
    container_name: dating-radar
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${RADAR_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: dating-notification
    ports:
      - "8092:8092"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${NOTIFICATION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      SWIPE_SERVICE_URL: http://dating-swipe:8083
      MATCH_SERVICE_URL: http://dating-match:8084
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  subscription-service:
    build:
      context: .
      dockerfile: services/subscription-service/Dockerfile
    container_name: dating-subscription
    ports:
      - "8091:8091"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      DATABASE_URL: ${SUBSCRIPTION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

  admin-dashboard:
    build:
      context: admin-dashboard
      dockerfile: Dockerfile
    container_name: dating-admin-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - dating-network
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: dating-admin
    ports:
      - "8095:8095"
    depends_on:
      - eureka-server
    env_file:
      - .env
    environment:
      ADMIN_DB_URL: ${ADMIN_DB_URL}
      AUTH_DB_URL: ${AUTH_DB_URL}
      USER_DB_URL: ${USER_DB_URL}
      SWIPE_DB_URL: ${SWIPE_DB_URL}
      MATCH_DB_URL: ${MATCH_DB_URL}
      MOOD_DB_URL: ${MOOD_DB_URL}
      SUBSCRIPTION_DB_URL: ${SUBSCRIPTION_DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_URL: ${REDIS_URL}
      CHAT_SERVICE_URL: http://dating-chat:8085
      SUBSCRIPTION_SERVICE_URL: http://dating-subscription:8091
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    networks:
      - dating-network
    restart: unless-stopped

networks:
  dating-network:
    driver: bridge

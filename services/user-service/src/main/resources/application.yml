#      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      url: ${REDIS_URL}
  cloud:
    discovery:
          enabled: false


eureka:
  client:
    enabled: false

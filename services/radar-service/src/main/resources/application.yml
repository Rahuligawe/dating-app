server:
  port: ${PORT:8089}

spring:
  application:
    name: radar-service
  datasource:
    # ── Old Supabase config (backup) ───────────────────────────────────────────
    #url: jdbc:postgresql://db.possrnoowinerucxubpg.supabase.co:5432/postgres
    #username: postgres
    #password: Princeofheart@2026
    # ── Railway PostgreSQL (active) ────────────────────────────────────────────
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # ── Kafka (disabled — replaced by Redis Streams) ────────────────────────────
  #kafka:
  #  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  #  properties:
  #    security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  #    sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
  #    sasl.jaas.config: ${KAFKA_SASL_CONFIG:}
  #  producer:
  #    key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      url: ${REDIS_URL}

eureka:
  client:
    enabled: false

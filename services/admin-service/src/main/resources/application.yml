server:
  port: ${PORT:8095}

spring:
  application:
    name: admin-service

  # ── Admin's own DB (ad_impressions table) ──────────────────────────────────
  datasource:
    url: ${ADMIN_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Redis (online user presence keys) ─────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL}
      lettuce:
        pool:
          enabled: true
          min-idle: 0
          max-idle: 1
          max-active: 2
          time-between-eviction-runs: 300000

admin:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
    expiry-hours: 720

chat:
  service:
    url: ${CHAT_SERVICE_URL:http://chat-service:8085}

subscription:
  service:
    url: ${SUBSCRIPTION_SERVICE_URL:http://dating-subscription:8091}

management:
  health:
    redis:
      enabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    com.rahul: INFO

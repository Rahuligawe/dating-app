server:
  port: ${PORT:8084}

spring:
  application:
    name: match-service
  datasource:
    # ── Old Supabase config (backup) ───────────────────────────────────────────
    #url: jdbc:postgresql://db.possrnoowinerucxubpg.supabase.co:5432/postgres
    #username: postgres
    #password: Princeofheart@2026
    # ── Railway PostgreSQL (active) ────────────────────────────────────────────
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # ── Kafka (disabled — replaced by Redis Streams) ────────────────────────────
  #kafka:
  #  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  #  properties:
  #    security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  #    sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
  #    sasl.jaas.config: ${KAFKA_SASL_CONFIG:}
  #  consumer:
  #    group-id: match-service
  #    auto-offset-reset: earliest
  #    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  #    properties:
  #      spring.json.trusted.packages: "*"
  #  producer:
  #    key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      url: ${REDIS_URL}
      lettuce:
        pool:
          enabled: true
          min-idle: 0
          max-idle: 1
          max-active: 2
          time-between-eviction-runs: 300000

eureka:
  client:
    enabled: false

management:
  health:
    redis:
      enabled: false

app:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8082}
  chat-service:
    url: ${CHAT_SERVICE_URL:http://localhost:8085}

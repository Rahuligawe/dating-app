server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    # ── Old Supabase config (backup) ───────────────────────────────────────────
    #url: jdbc:postgresql://db.possrnoowinerucxubpg.supabase.co:5432/postgres
    #username: postgres
    #password: Princeofheart@2026
    # ── Railway PostgreSQL (active) ────────────────────────────────────────────
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # ── Kafka (no broker running — fail fast so requests don't block 60s) ───────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: 500              # fail in 0.5s instead of default 60s
        request.timeout.ms: 500
        delivery.timeout.ms: 1000
  data:
    redis:
      url: ${REDIS_URL}
      lettuce:
        pool:
          enabled: true
          min-idle: 0
          max-idle: 1
          max-active: 2
          time-between-eviction-runs: 300000

eureka:
  client:
    enabled: false

management:
  health:
    redis:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:datingAppSecretKey2024VeryLongSecretKeyForHS256Algorithm}
    expiration: 315360000000    # 10 years in ms
    refresh-expiration: 315360000000     # 10 years in ms
  otp:
    expiry-minutes: 10
  user-service:
    url: ${USER_SERVICE_URL:https://creative-art-production.up.railway.app}

# ── SMS config (priority: MSG91 → Fast2SMS → 2Factor Voice) ─────────────────
sms:
  fast2sms:
    api-key: ${FAST2SMS_API_KEY:}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    template-id: ${MSG91_TEMPLATE_ID:}
  twofactor:
    api-key: ${TWO_FACTOR_API_KEY:}

logging:
  level:
    com.rahul: DEBUG
    org.springframework.web: DEBUG
